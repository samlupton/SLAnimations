name: iOS Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Optional: helpful for debugging CI environments
      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve Swift Package Dependencies
        run: xcodebuild -resolvePackageDependencies -scheme Plume

      - name: Build (iOS Simulator)
        run: |
          xcodebuild build \
            -scheme Plume \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO

      - name: Test (iOS Simulator)
        run: |
          xcodebuild test \
            -scheme Plume \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO
